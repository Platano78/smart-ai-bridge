# Smart AI Bridge - CI
# Runs the test suite, dependency audit, and secret detection on push and PR.

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.js'
      - 'tests/**'
      - 'package*.json'
      - '.github/workflows/security-validation.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')

          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found"
            exit 1
          fi

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Heuristic secret grep
        run: |
          echo "Checking for potential secrets in source..."

          if grep -rE "(api[_-]?key|apikey)\s*[:=]\s*['\"][^'\"]{20,}" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v test | grep -v -E "(process\.env|config\[)"; then
            echo "::warning::Potential API keys found in source"
          fi

          if grep -rE "password\s*[:=]\s*['\"][^'\"]+['\"]" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v test | grep -v -E "(process\.env|placeholder|example)"; then
            echo "::warning::Potential hardcoded passwords found"
          fi

          echo "Secret heuristic scan complete"
